{% extends "base.html" %}
{% block content %}
<div class="hero-text">
    <h1>İhlal Raporları</h1>
</div>

<table class="report-table">
    <thead>
        <tr>
            <th>Tarih / Saat</th>
            <th>İhlal Türü</th>
            <th>Kanıt</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr>
            <td>{{ log.Tarih_Saat }}</td>
            <td style="color: var(--isg-red);">{{ log.Ihlal_Turu }}</td>
            <td>
                <button class="btn btn-primary" onclick="openEvidenceModal('/evidence/{{ log.Dosya_Adi }}', '{{ log.Dosya_Adi }}')" style="padding: 6px 12px; font-size: 14px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    Kanıtı Görüntüle
                </button>            
            </td>
        </tr>
        {% else %}
        <tr><td colspan="3" style="text-align: center;">Saha şu an güvenli.</td></tr>
        {% endfor %}
    </tbody>
</table>

<div id="evidenceModal" class="modal">
    <div class="modal-content" style="text-align: center;">
        <button class="btn btn-danger" onclick="closeEvidenceModal()" style="float: right; margin-bottom: 15px;">X</button>
        <div style="clear: both;"></div> <img id="fullImg" style="width: 100%; border: 4px solid var(--border-color); margin-bottom: 20px;">
        
        <a id="downloadBtn" href="#" download class="btn btn-primary" style="margin-bottom: 10px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Kanıt Görselini İndir
        </a>
    </div>
</div>
{% endblock %}
