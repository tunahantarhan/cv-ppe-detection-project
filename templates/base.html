<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ISG Denetim Sistemi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    <link rel="icon" href="{{ url_for('static', filename='images/isg-denetim-sistemi-icon.png') }}" type="image/png">

<body>
    <header>
        <div class="isg-stripe"></div>
        <nav class="navbar">

                <a href="/">

                </a>
            </div>
            <div class="nav-links">
                <a href="/camera">Canlı Kontrol</a>
                <a href="/video">Görüntü Kontrol</a>
                <a href="/reports">Raporlar</a>
                <a href="/about">Sistem Hakkında</a>
                <button id="theme-toggle">🌙</button>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-links" style="display: flex; justify-content: center; align-items: center; gap: 20px;">
            <a href="/camera">Canlı Kontrol</a> | 
            <a href="/video">Görüntü Üzerinden Kontrol</a> | 
            <a href="/reports">Raporlar</a> | 
            <a href="/about">Sistem Hakkında</a> |

</html>
